<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusPlay | Multiplayer Gaming Platform</title>
  
  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">
  
  <!-- Config & Platform Scripts (Load Order Matters) -->
  <script src="config.js"></script>
  <script src="platform.js" defer></script>
</head>
<body>
  <!-- Background Effects -->
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <!-- Header -->
  <header>
    <div class="logo">NEXUS<span>PLAY</span></div>
    <div id="auth-ui" style="display:none;" class="user-panel">
      <span class="coin-badge" id="ui-coins">🪙 0</span>
      <span class="username" id="ui-user">Player</span>
      <button class="btn btn-ghost" data-action="logout">Logout</button>
    </div>
    <button id="login-trigger" class="btn btn-primary">🎮 Login</button>
  </header>

  <!-- Dashboard View -->
  <div id="dashboard-view" class="view active dashboard">
    <h2 class="section-title">🔥 Trending Games</h2>
    <div class="games-grid" id="games-list">
      <!-- Games injected by platform.js -->
    </div>
  </div>

  <!-- Game View -->
  <div id="game-view" class="view game-container">
    <div class="game-header">
      <button id="back-btn" class="btn btn-ghost">⬅️ Back</button>
      <h3 id="game-title">Game</h3>
      <div class="user-panel">
        <span class="coin-badge" id="game-coins">🪙 0</span>
      </div>
    </div>
    <div class="game-stage" id="game-stage">
      <!-- Game loads here dynamically -->
      <div style="display:flex;align-items:center;justify-content:center;height:100%;color:#94a3b8">
        Loading game...
      </div>
    </div>
  </div>

  <!-- Login Modal -->
  <div id="login-modal" class="modal active">
    <div class="modal-box">
      <h2 style="font-family:'Orbitron',sans-serif;color:var(--primary);margin-bottom:1rem">Welcome!</h2>
      <p style="color:var(--muted);margin-bottom:1rem">Enter username to save progress & play online</p>
      <input type="text" id="username-input" class="input" placeholder="Username (3-20 chars)" maxlength="20">
      <button id="login-btn" class="btn btn-primary" style="width:100%;margin-top:1rem">🚀 Enter Platform</button>
      <p style="font-size:0.75rem;color:var(--muted);margin-top:1rem">No password • Progress saved on server</p>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Socket.IO (For multiplayer games) -->
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  
  <!-- Game Script (Loaded dynamically by platform) -->
  <!-- game-balloon.js will be injected when Balloon Pop is launched -->
</body>
</html>
